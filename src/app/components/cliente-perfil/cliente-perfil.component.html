<div class="page-header centro">
  <h2>Mi perfil</h2>
  <p>Datos de tu cuenta de cliente</p>
</div>

<mat-card class="page-card form-card form-card-wide">
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="guardar()" class="form-container">
      <mat-form-field appearance="outline">
        <mat-label>Nombres</mat-label>
        <input matInput formControlName="nombres" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Apellidos</mat-label>
        <input matInput formControlName="apellidos" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Telefono</mat-label>
        <input matInput formControlName="telefono" />
      </mat-form-field>
      <div class="form-botones">
        <button mat-raised-button color="primary" type="submit">Guardar</button>
        <a mat-button routerLink="/cliente/inicio">Volver</a>
      </div>
    </form>
    @if (mensaje) { <p class="error-msg">{{ mensaje }}</p> }
  </mat-card-content>
</mat-card>
