<mat-toolbar color="primary" class="toolbar">
  <a mat-button class="logo" routerLink="/home">QaliKay</a>

  <nav class="nav-links">
    <a mat-button class="nav-link" routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
      Inicio
    </a>
    <a mat-button class="nav-link" routerLink="/recetas" routerLinkActive="active">Recetas</a>
    <a mat-button class="nav-link" routerLink="/insumos" routerLinkActive="active">Insumos</a>
    <a mat-button class="nav-link" routerLink="/expertos" routerLinkActive="active">Expertos</a>

    @if (auth.estaLogueado()) {
      <a mat-button class="nav-link nav-link-panel" [routerLink]="auth.getRutaInicio()" routerLinkActive="active">
        Mi panel
      </a>
    }
  </nav>

  <span class="spacer"></span>

  <div class="toolbar-actions">
    @if (auth.estaLogueado()) {
      <span class="usuario">
        <span class="usuario-nombre">{{ auth.getUsername() }}</span>
        <span class="rol-chip">{{ auth.getRolEtiqueta() }}</span>
      </span>
      @if (auth.esCliente()) {
        <a mat-button class="nav-link" routerLink="/cliente/perfil">Perfil</a>
      }
      @if (auth.esExperto()) {
        <a mat-button class="nav-link" routerLink="/experto/perfil">Perfil</a>
      }
      @if (auth.esAdmin()) {
        <a mat-button class="nav-link" routerLink="/admin/inicio">Admin</a>
      }
      <button mat-stroked-button class="btn-salir" (click)="logout()">Salir</button>
    } @else {
      <a mat-button class="nav-link" routerLink="/login">Ingresar</a>
      <a mat-raised-button color="accent" class="btn-registro" routerLink="/register">Registrarse</a>
    }
  </div>
</mat-toolbar>
