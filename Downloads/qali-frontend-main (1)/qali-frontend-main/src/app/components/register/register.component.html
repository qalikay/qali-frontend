<div class="page-header centro">
  <h2>Registro de cliente</h2>
  <p>Crea tu cuenta para explorar recetas, insumos y consultar expertos</p>
</div>

<mat-card class="page-card form-card">
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="registrar()" class="form-container">
      <mat-form-field appearance="outline">
        <mat-label>Usuario</mat-label>
        <input matInput formControlName="username" required />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Contrasena</mat-label>
        <input matInput type="password" formControlName="password" required />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Nombres</mat-label>
        <input matInput formControlName="nombres" required />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Apellidos</mat-label>
        <input matInput formControlName="apellidos" required />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Telefono</mat-label>
        <input matInput formControlName="telefono" required />
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
        Registrarse
      </button>
    </form>

    @if (mensaje) {
      <p class="error-msg">{{ mensaje }}</p>
    }

    <p class="link-footer">
      <a routerLink="/register">Elegir otro tipo de cuenta</a> ·
      <a routerLink="/login">Ya tengo cuenta</a>
    </p>
  </mat-card-content>
</mat-card>
